<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <script>
      (() => {
        const storageKey = 'zenmind:theme';
        const root = document.documentElement;
        let storedMode = 'auto';
        try {
          const stored = localStorage.getItem(storageKey);
          storedMode = stored === 'light' || stored === 'dark' || stored === 'auto' ? stored : 'auto';
        } catch {
          storedMode = 'auto';
        }

        const theme =
          storedMode === 'auto'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : storedMode;

        root.dataset.themeMode = storedMode;
        root.dataset.theme = theme;
        root.style.colorScheme = theme;
      })();
    </script>
    <title>ZenMind | Desktop-first AI Agent Platform</title>
    <meta
      name="description"
      content="ZenMind is a Desktop-first AI agent platform for local services, web and mobile workflows, Chinese model ecosystems, and local sandboxes."
    />
    <meta
      name="theme-color"
      content="#f7f7f4"
    />
    <style>
      body{background:#f7f7f4}
      html[data-theme='dark'] body{background:#08090c}
    </style>
    <meta
      property="og:title"
      content="ZenMind | Desktop-first AI Agent Platform"
    />
    <meta
      property="og:description"
      content="A Desktop-first AI agent platform for local services, web and mobile workflows, Chinese model ecosystems, and local sandboxes."
    />
    <meta
      property="og:type"
      content="website"
    />
    <meta
      property="og:url"
      content="https://www.zenmind.cc"
    />
    <meta
      property="og:site_name"
      content="ZenMind"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
  </head>
  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
