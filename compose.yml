services:
  website:
    build:
      context: .
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    image: zenmind-official-website
    container_name: zenmind-official-website
    environment:
      AUTHENTIK_OUTPOST_UPSTREAM: ${AUTHENTIK_OUTPOST_UPSTREAM:-http://authentik-server:9000}
      SSO_BRIDGE_TOKEN: ${SSO_BRIDGE_TOKEN:?SSO bridge token required}
    ports:
      - "${WEBSITE_PORT:-80}:80"
    networks:
      zenmind-official-net:
        aliases:
          - zenmind-official-website

networks:
  zenmind-official-net:
    external: true
